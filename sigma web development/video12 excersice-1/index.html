<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-1</title>

    <style>
        audio,
        video {
            display: block;
            margin-bottom: 20px;
        }
    </style>
</head>


<h1>Exercise-1 pure html audio and video</h1>

<h2>Audio Section</h2>

<div>
    <audio width="290%" src="1.mp3" controls></audio>
    <audio width="290%" src="2.mp3" controls autoplay muted></audio>
    <audio width="290%" src="3.mp3" controls loop></audio>
    <audio width="290%" src="4.mp3" controls autoplay loop muted></audio>
    <audio width="290%" src="5.mp3" controls autoplay loop muted></audio>
    <audio width="290%" src="6.mp3" controls autoplay loop muted></audio>
</div>
<hr>

<h2>Video Section</h2>
<div>

    <video src="1.mp4" height="240" controls></video>
    <video src="2.mp4" height="240" controls autoplay muted></video>
    <video src="3.mp4" height="240" controls loop></video>
    <video src="4.mp4" height="240" controls autoplay loop muted></video>
    <video src="5.mp4" height="240" controls autoplay loop muted></video>
    <video src="6.mp4" height="240" controls autoplay loop muted></video>

</div>
</body>

</html>
